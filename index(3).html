<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Topping GPS Simple</title>
<style>
  body { margin:0; font-family:Arial, sans-serif; background:#101418; color:white; }
  header { background:#1d252d; padding:12px; text-align:center; font-size:24px; font-weight:bold; }
  .panel { padding:10px; }
  button, input {
    width:100%;
    box-sizing:border-box;
    padding:13px;
    margin-top:7px;
    font-size:20px;
    border:0;
    border-radius:10px;
  }
  button { background:#2f8cff; color:white; font-weight:bold; }
  .green { background:#24a148; }
  .orange { background:#d99022; }
  .red { background:#d64545; }
  .grey { background:#56616c; }
  .row { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
  label { display:block; margin-top:8px; color:#d5dbe0; }
  input { background:white; color:#111; }
  canvas { width:100%; height:430px; background:#27313b; display:block; }
  .stats { display:grid; grid-template-columns:1fr 1fr; gap:8px; padding:10px; }
  .box { background:#1b232b; border-radius:12px; padding:10px; }
  .small { color:#b7c0c9; font-size:14px; }
  .big { font-size:28px; font-weight:bold; }
  .ok { color:#7dff9b; }
  .warn { color:#ffd66b; }
  .bad { color:#ff8b8b; }
  #msg { padding:10px; color:#ffd66b; font-weight:bold; }
</style>
</head>
<body>

<header>Topping GPS Simple</header>

<div class="panel">
  <label>Working width, metres</label>
  <input id="width" type="number" value="1.85" min="0.5" step="0.05" onchange="saveJob(); updateStats(); draw();">

  <label>Optional field size, acres</label>
  <input id="fieldAcres" type="number" placeholder="e.g. 17" min="0" step="0.1" onchange="saveJob(); updateStats();">

  <div class="row">
    <button class="green" onclick="startGps()">Start GPS</button>
    <button class="red" onclick="stopGps()">Stop</button>
  </div>

  <div class="row">
    <button class="orange" id="pauseBtn" onclick="togglePause()">Pause</button>
    <button class="grey" onclick="resumeSaved()">Resume saved</button>
  </div>

  <button class="red" onclick="clearJob()">Clear coverage</button>
</div>

<canvas id="map" width="900" height="650"></canvas>

<div class="stats">
  <div class="box"><div class="small">GPS status</div><div id="status" class="big warn">Off</div></div>
  <div class="box"><div class="small">Accuracy</div><div id="acc" class="big">-- m</div></div>
  <div class="box"><div class="small">Distance</div><div id="dist" class="big">0 m</div></div>
  <div class="box"><div class="small">Area</div><div id="area" class="big">0.00 ac</div></div>
  <div class="box"><div class="small">Speed</div><div id="speed" class="big">--</div></div>
  <div class="box"><div class="small">Progress</div><div id="progress" class="big">--</div></div>
</div>

<div id="msg">Open from GitHub Pages, not Downloads. Keep phone near windscreen.</div>

<script>
let watchId = null;
let wakeLock = null;
let points = [];
let last = null;
let current = null;
let totalDist = 0;
let paused = false;
let lastAcc = null;
let lastSpeed = null;

const SAVE_KEY = "topping_gps_simple_github_v1";
const canvas = document.getElementById("map");
const ctx = canvas.getContext("2d");

function toRad(d){ return d * Math.PI / 180; }

function distance(a,b){
  const R = 6371000;
  const dLat = toRad(b.lat - a.lat);
  const dLon = toRad(b.lon - a.lon);
  const lat1 = toRad(a.lat);
  const lat2 = toRad(b.lat);
  const x = Math.sin(dLat/2)**2 + Math.cos(lat1)*Math.cos(lat2)*Math.sin(dLon/2)**2;
  return 2 * R * Math.atan2(Math.sqrt(x), Math.sqrt(1-x));
}

async function keepScreenAwake(){
  try{
    if("wakeLock" in navigator){
      wakeLock = await navigator.wakeLock.request("screen");
      document.getElementById("msg").textContent = "Screen wake lock active. Some phones may still dim.";
    } else {
      document.getElementById("msg").textContent = "Wake lock not supported. Set screen timeout longer in phone settings.";
    }
  }catch(e){
    document.getElementById("msg").textContent = "Could not keep screen awake. Set screen timeout longer.";
  }
}

function releaseWakeLock(){
  try{
    if(wakeLock){
      wakeLock.release();
      wakeLock = null;
    }
  }catch(e){}
}

document.addEventListener("visibilitychange", function(){
  if(document.visibilityState === "visible" && watchId !== null){
    keepScreenAwake();
  }
});

function startGps(){
  if(!navigator.geolocation){
    alert("GPS not supported");
    return;
  }

  if(watchId !== null){
    navigator.geolocation.clearWatch(watchId);
  }

  keepScreenAwake();

  document.getElementById("status").textContent = "Starting";
  document.getElementById("status").className = "big warn";

  watchId = navigator.geolocation.watchPosition(function(pos){
    const p = {
      lat: pos.coords.latitude,
      lon: pos.coords.longitude,
      t: Date.now()
    };

    const acc = pos.coords.accuracy || 999;
    lastAcc = acc;
    current = p;

    let speedKph = null;

    if(!paused){
      if(last){
        const d = distance(last, p);
        const dt = (p.t - last.t) / 1000;

        if(d > 0.35 && d < 80 && dt > 0){
          totalDist += d;
          speedKph = (d / dt) * 3.6;
          lastSpeed = speedKph;
          points.push(p);
        }
      } else {
        points.push(p);
      }
    }

    last = p;

    updateStats();
    draw();
    saveJob();

  }, function(err){
    document.getElementById("status").textContent = "GPS error";
    document.getElementById("status").className = "big bad";
    alert(err.message);
  }, {
    enableHighAccuracy:true,
    maximumAge:1000,
    timeout:10000
  });
}

function stopGps(){
  if(watchId !== null){
    navigator.geolocation.clearWatch(watchId);
    watchId = null;
  }
  releaseWakeLock();
  document.getElementById("status").textContent = "Off";
  document.getElementById("status").className = "big warn";
  saveJob();
}

function togglePause(){
  paused = !paused;
  document.getElementById("pauseBtn").textContent = paused ? "Resume" : "Pause";
  document.getElementById("msg").textContent = paused ? "Paused: GPS still runs, coverage is not recorded." : "Recording coverage.";
  updateStats();
  draw();
  saveJob();
}

function clearJob(){
  if(!confirm("Clear coverage and saved track?")) return;
  points = [];
  last = null;
  current = null;
  totalDist = 0;
  lastSpeed = null;
  paused = false;
  document.getElementById("pauseBtn").textContent = "Pause";
  localStorage.removeItem(SAVE_KEY);
  updateStats();
  draw();
}

function saveJob(){
  const data = {
    points,
    last,
    current,
    totalDist,
    paused,
    width: document.getElementById("width").value,
    fieldAcres: document.getElementById("fieldAcres").value
  };
  localStorage.setItem(SAVE_KEY, JSON.stringify(data));
}

function resumeSaved(){
  const raw = localStorage.getItem(SAVE_KEY);
  if(!raw){
    alert("No saved job found");
    return;
  }
  try{
    const data = JSON.parse(raw);
    points = data.points || [];
    last = data.last || null;
    current = data.current || last;
    totalDist = data.totalDist || 0;
    paused = !!data.paused;
    document.getElementById("width").value = data.width || "1.85";
    document.getElementById("fieldAcres").value = data.fieldAcres || "";
    document.getElementById("pauseBtn").textContent = paused ? "Resume" : "Pause";
    updateStats();
    draw();
    document.getElementById("msg").textContent = "Saved job loaded. Press Start GPS to continue.";
  }catch(e){
    alert("Could not load saved job");
  }
}

function updateStats(){
  const width = parseFloat(document.getElementById("width").value) || 1.85;
  const areaM2 = totalDist * width;
  const acres = areaM2 / 4046.8564224;
  const fieldAcres = parseFloat(document.getElementById("fieldAcres").value);

  document.getElementById("acc").textContent = lastAcc ? Math.round(lastAcc)+" m" : "-- m";
  document.getElementById("dist").textContent = Math.round(totalDist)+" m";
  document.getElementById("area").textContent = acres.toFixed(2)+" ac";
  document.getElementById("speed").textContent = lastSpeed == null ? "--" : lastSpeed.toFixed(1)+" km/h";
  document.getElementById("progress").textContent = fieldAcres ? Math.min(999, acres/fieldAcres*100).toFixed(0)+"%" : "--";

  if(watchId === null){
    document.getElementById("status").textContent = "Off";
    document.getElementById("status").className = "big warn";
  } else if(paused){
    document.getElementById("status").textContent = "Paused";
    document.getElementById("status").className = "big warn";
  } else {
    document.getElementById("status").textContent = "On";
    document.getElementById("status").className = lastAcc && lastAcc <= 12 ? "big ok" : "big warn";
  }
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle = "#27313b";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle = "#dbe5ee";
  ctx.font = "24px Arial";
  ctx.fillText("Local coverage map", 20, 35);

  if(points.length < 1 && !current){
    ctx.font = "20px Arial";
    ctx.fillText("Press Start GPS outside", 20, 75);
    return;
  }

  const drawPoints = current ? points.concat([current]) : points;
  let minLat = drawPoints[0].lat, maxLat = drawPoints[0].lat;
  let minLon = drawPoints[0].lon, maxLon = drawPoints[0].lon;

  for(const p of drawPoints){
    if(p.lat < minLat) minLat = p.lat;
    if(p.lat > maxLat) maxLat = p.lat;
    if(p.lon < minLon) minLon = p.lon;
    if(p.lon > maxLon) maxLon = p.lon;
  }

  const pad = 55;
  const latRange = Math.max(maxLat - minLat, 0.00005);
  const lonRange = Math.max(maxLon - minLon, 0.00005);

  function xy(p){
    return {
      x: pad + (p.lon - minLon) / lonRange * (canvas.width - pad*2),
      y: canvas.height - pad - (p.lat - minLat) / latRange * (canvas.height - pad*2)
    };
  }

  const width = parseFloat(document.getElementById("width").value) || 1.85;

  if(points.length > 1){
    ctx.strokeStyle = "rgba(125,255,155,0.75)";
    ctx.lineWidth = Math.max(6, width * 8);
    ctx.lineCap = "round";
    ctx.lineJoin = "round";
    ctx.beginPath();
    for(let i=0; i<points.length; i++){
      const q = xy(points[i]);
      if(i === 0) ctx.moveTo(q.x, q.y);
      else ctx.lineTo(q.x, q.y);
    }
    ctx.stroke();

    ctx.strokeStyle = "rgba(0,0,0,0.55)";
    ctx.lineWidth = 3;
    ctx.beginPath();
    for(let i=0; i<points.length; i++){
      const q = xy(points[i]);
      if(i === 0) ctx.moveTo(q.x, q.y);
      else ctx.lineTo(q.x, q.y);
    }
    ctx.stroke();
  }

  if(current){
    const q = xy(current);
    ctx.fillStyle = paused ? "#ffb000" : "#2f8cff";
    ctx.beginPath();
    ctx.arc(q.x, q.y, 13, 0, Math.PI*2);
    ctx.fill();
    ctx.strokeStyle = "white";
    ctx.lineWidth = 4;
    ctx.stroke();
  }
}

draw();
</script>
</body>
</html>
